# ─── Prefix: Alt+b ───────────────────────────────────────────────────
unbind C-b
set-option -g prefix M-b
bind-key M-b send-prefix

# ─── Core settings ────────────────────────────────────────────────────
set -g allow-passthrough on
set -g visual-activity off
set -g mouse on
set -g mode-keys vi
set -sg escape-time 5
set -g history-limit 50000
set -g status-interval 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ─── Copy mode ────────────────────────────────────────────────────────
bind-key -T copy-mode-vi v     send -X begin-selection
bind-key -T copy-mode-vi C-v   send -X rectangle-toggle
bind-key -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Copy-mode pane navigation (same keys, no conflict)
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# ─── Vim-Tmux Navigator ───────────────────────────────────────────────
# Smart pane switching — hands off to nvim plugin when inside nvim/fzf
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Restore clear-screen since C-l is taken
bind C-l send-keys C-l

# ─── Plugins ──────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Tokyo Night theme
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @theme_variation          'night'
set -g @theme_left_separator     ''
set -g @theme_right_separator    ''
set -g @theme_plugins            'datetime'
set -g @theme_transparent_status_bar 'true'

# ─── tmux-resurrect ───────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'

# ─── tmux-continuum ───────────────────────────────────────────────────
# Save every 5 minutes but do NOT auto-restore on startup
# (use prefix + C-r manually when you want to restore)
set -g @continuum-restore      'off'   # <── was 'on'; this caused auto-login
set -g @continuum-save-interval '5'

# ─── Reload ───────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ─── Run TPM (always last) ────────────────────────────────────────────
run '~/.config/tmux/plugins/tpm/tpm'
